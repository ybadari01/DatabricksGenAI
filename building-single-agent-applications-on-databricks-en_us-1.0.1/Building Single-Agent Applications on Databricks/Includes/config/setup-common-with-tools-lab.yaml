# Classroom-Setup-3.1: Reproducible Agents — Single Agent Config
# Loads Airbnb data, creates UC volume, registers avg_neigh_price + cnt_by_room_type.
# A demo_agent1_config.json is written by the notebook after setup.

medallion_lab: false
dev_mode: false
resource_cleanup: false

course_name: "Building Single-Agent Applications on Databricks"
serverless_compute_version: "5"

catalog:
  prefix: "labuser"
  schema_name: "airbnb_agent"
  volume_name: "agent_vol"

data:
  databricks_share_name: "databricks_airbnb_sample_data"   ## Modify if using your own workspace
  table_name: "sf_airbnb_listings"
  vocareum_share_name: "airbnb"

tools:
  - avg_fare_by_zip
  - cnt_lng_dist_trip
